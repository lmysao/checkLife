<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ritual diário</title>

<!-- ============ PWA / MOBILE META TAGS ============ -->
<meta name="description" content="Acompanhe seus rituais diários, humor, hidratação, macros e pirâmide alimentar.">
<meta name="theme-color" content="#C1502E" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#16120E" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ritual">
<meta name="application-name" content="Ritual">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Karla:ital,wght@0,400;0,500;0,700;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ============ THEME: LIGHT (default) ============ */
  :root{
    --bg: #F1E4C9;
    --bg-grad: radial-gradient(circle at 20% 0%, #F5EAD2 0%, #F1E4C9 55%);
    --card: #FFFBF2;
    --ink: #2B2117;
    --ink-soft: #6B5D4D;
    --line: #DCC9A0;
    --accent: #C1502E;
    --accent-soft: #C1502E22;
    --radius: 16px;
    --shadow: 0 1px 0 rgba(43,33,23,0.04);
    --input-bg: #fff;
    --overlay: rgba(43,33,23,0.45);
  }
  /* ============ THEME: DARK ============ */
  [data-theme="dark"]{
    --bg: #16120E;
    --bg-grad: radial-gradient(circle at 20% 0%, #1F1A14 0%, #16120E 55%);
    --card: #221C16;
    --ink: #F1E4C9;
    --ink-soft: #A8937A;
    --line: #3A3128;
    --accent: #E07A4F;
    --accent-soft: #E07A4F22;
    --shadow: 0 1px 0 rgba(0,0,0,0.4);
    --input-bg: #2A231B;
    --overlay: rgba(0,0,0,0.6);
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg-grad), var(--bg);
    color: var(--ink);
    font-family: 'Karla', sans-serif;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
    transition: background-color .3s ease, color .3s ease;
  }
  .wrap{
    max-width: 480px;
    margin: 0 auto;
    padding: 18px 16px 96px;
  }
  header.top{
    display:flex;
    align-items:center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 8px;
  }
  header.top h1{
    font-family:'Bricolage Grotesque', sans-serif;
    font-weight:700;
    font-size: 22px;
    margin:0;
    letter-spacing: -0.02em;
  }
  .top-actions{ display:flex; align-items:center; gap:6px; }
  .icon-btn{
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    width: 34px; height: 34px;
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    padding:0;
    transition: transform .15s ease, border-color .15s ease;
  }
  .icon-btn:hover{ transform: translateY(-1px); border-color: var(--accent); }
  .icon-btn svg{ width:16px; height:16px; }
  .sync{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 4px 8px;
    border-radius: 20px;
    background: var(--card);
    border: 1px solid var(--line);
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .sync.ok::before{ content:"● "; color:#5C7A3A; }
  .sync.off::before{ content:"● "; color:#B5566B; }

  nav.tabs{
    display:flex;
    gap:6px;
    overflow-x:auto;
    padding-bottom: 6px;
    margin-bottom: 16px;
    scrollbar-width:none;
    align-items:center;
  }
  nav.tabs::-webkit-scrollbar{ display:none; }
  nav.tabs button.tab{
    flex: 0 0 auto;
    font-family:'Karla', sans-serif;
    font-weight:700;
    font-size: 13px;
    padding: 8px 13px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    cursor:pointer;
    transition: all .18s ease;
    display:flex; align-items:center; gap:6px;
  }
  nav.tabs button.tab:hover{ border-color: var(--accent); color: var(--ink); }
  nav.tabs button.tab.active{
    background: var(--accent);
    border-color: var(--accent);
    color: #FFFBF2;
  }
  nav.tabs button.tab .dot{
    width:6px; height:6px; border-radius:50%; background: currentColor; opacity:.5;
  }
  nav.tabs button.tab.active .dot{ opacity:1; background:#FFFBF2; }
  nav.tabs .add-tab{
    flex:0 0 auto;
    width:32px; height:32px;
    border-radius:50%;
    border: 1px dashed var(--line);
    background: transparent;
    color: var(--ink-soft);
    font-size:18px; line-height:1;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: all .15s ease;
  }
  nav.tabs .add-tab:hover{ border-color: var(--accent); color: var(--accent); border-style:solid; }

  .card{
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--line);
    padding: 16px;
    box-shadow: var(--shadow);
  }
  .card + .card{ margin-top: 12px; }

  .module-head{
    display:flex;
    align-items:flex-end;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 8px;
  }
  .module-head h2{
    font-family:'Bricolage Grotesque', sans-serif;
    font-size: 19px;
    margin:0;
  }
  .module-head .period{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    display:block;
    margin-top:2px;
  }
  .frac{
    font-family:'JetBrains Mono', monospace;
    font-weight:600;
    font-size: 15px;
    color: var(--accent);
    white-space:nowrap;
  }
  .bar{
    height:6px;
    border-radius: 4px;
    background: var(--line);
    overflow:hidden;
    margin-bottom: 14px;
  }
  .bar > div{
    height:100%;
    background: var(--accent);
    transition: width .35s ease;
  }

  ul.items{ list-style:none; margin:0; padding:0; }
  ul.items li{
    display:flex;
    align-items:center;
    gap:10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--line);
  }
  ul.items li:last-child{ border-bottom:none; }

  .stamp{
    flex: 0 0 auto;
    width: 28px;
    height: 28px;
    border-radius: 7px;
    border: 2px solid var(--accent);
    background: transparent;
    cursor:pointer;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:13px;
    color: transparent;
    transition: transform .18s ease, background .15s ease;
  }
  .stamp.checked{
    background: var(--accent);
    color:#FFFBF2;
  }
  .stamp.bump{ animation: bump .28s ease; }
  @keyframes bump{
    0%{ transform: scale(1) rotate(0deg); }
    45%{ transform: scale(1.25) rotate(var(--tilt,-6deg)); }
    100%{ transform: scale(1) rotate(0deg); }
  }
  @media (prefers-reduced-motion: reduce){
    .stamp.bump{ animation:none; }
    .fade-in{ animation:none !important; }
  }

  .item-label{ flex:1; font-size: 15px; line-height:1.3; }
  .item-label.done{ color: var(--ink-soft); text-decoration: line-through; text-decoration-color: var(--line); }

  .edit-controls{ display:flex; gap:4px; flex:0 0 auto; }
  .edit-controls button{
    border:none;
    background:none;
    color: var(--ink-soft);
    font-size:15px;
    cursor:pointer;
    padding:4px;
    line-height:1;
  }
  .edit-controls button:hover{ color: var(--accent); }

  .row-actions{
    display:flex;
    gap:8px;
    margin-top: 14px;
    flex-wrap:wrap;
  }
  .btn{
    font-family:'Karla', sans-serif;
    font-weight:700;
    font-size: 13px;
    padding: 9px 14px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    cursor:pointer;
    transition: all .15s ease;
  }
  .btn:hover{ border-color: var(--accent); }
  .btn.primary{
    background: var(--accent);
    border-color: var(--accent);
    color:#FFFBF2;
  }
  .btn.ghost{ color: var(--ink-soft); }
  .btn.danger{ color: #B5566B; border-color: var(--line); }
  .btn.danger:hover{ border-color:#B5566B; }

  .add-row{
    display:flex;
    gap:8px;
    margin-top: 12px;
    flex-wrap:wrap;
  }
  .add-row input, .add-row select{
    font-family:'Karla', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--input-bg);
    color: var(--ink);
  }
  .add-row input{ flex:1; min-width: 120px; }
  .add-row input:focus, .add-row select:focus{ outline: 2px solid var(--accent); outline-offset:1px; }

  .pill{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 999px;
    color: #fff;
    text-transform: lowercase;
  }

  select.priority{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--input-bg);
    padding: 4px 6px;
    color: var(--ink-soft);
  }

  .mood-grid{ display:flex; gap:8px; justify-content:space-between; margin-bottom: 14px; }
  .mood-grid button{
    flex:1;
    font-size: 26px;
    background: var(--input-bg);
    border: 2px solid var(--line);
    border-radius: 12px;
    padding: 10px 0;
    cursor:pointer;
    transition: all .18s ease;
  }
  .mood-grid button:hover{ transform: translateY(-2px); }
  .mood-grid button.selected{
    border-color: var(--accent);
    background: var(--accent-soft);
    transform: translateY(-2px) scale(1.05);
  }
  textarea.note{
    width:100%;
    font-family:'Karla', sans-serif;
    font-size: 14px;
    border-radius: 10px;
    border: 1px solid var(--line);
    padding: 10px 12px;
    resize: vertical;
    min-height: 60px;
    background: var(--input-bg);
    color: var(--ink);
  }
  textarea.note:focus{ outline: 2px solid var(--accent); outline-offset:1px; }

  .hist-block{ margin-bottom: 18px; }
  .hist-block:last-child{ margin-bottom:0; }
  .hist-block h3{
    font-family:'Bricolage Grotesque', sans-serif;
    font-size: 15px;
    margin: 0 0 8px;
  }
  .hist-row{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .hist-row .label{ width: 110px; font-size: 12px; color: var(--ink-soft); flex:0 0 auto; }
  .hist-row .track{ flex:1; height:8px; border-radius:5px; background: var(--line); overflow:hidden; }
  .hist-row .track > div{ height:100%; }
  .hist-row .pct{ width: 38px; text-align:right; font-family:'JetBrains Mono', monospace; font-size:11px; color: var(--ink-soft); }

  .streaks{ display:flex; flex-wrap:wrap; gap:8px; }
  .streak-chip{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 8px 10px;
    border-radius: 10px;
    background: var(--input-bg);
    border: 1px solid var(--line);
    color: var(--ink);
  }
  .streak-chip b{ display:block; font-size:16px; }

  .mood-chart{ display:flex; align-items:flex-end; gap:4px; height: 70px; margin-bottom: 6px; }
  .mood-chart .bar2{ flex:1; border-radius: 4px 4px 0 0; min-height:4px; transition: height .3s ease; }
  .mood-chart-labels{ display:flex; gap:4px; font-family:'JetBrains Mono', monospace; font-size:9px; color:var(--ink-soft); }
  .mood-chart-labels span{ flex:1; text-align:center; }

  .empty{
    color: var(--ink-soft);
    font-size: 14px;
    text-align:center;
    padding: 18px 0;
  }
  .small-note{
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 10px;
  }

  /* ============ DASHBOARD / RESUMO ============ */
  .dash-hero{
    background: var(--accent);
    color: #FFFBF2;
    border-color: var(--accent);
  }
  .dash-hero .module-head h2{ color:#FFFBF2; }
  .dash-hero .module-head .period{ color: rgba(255,251,242,0.8); }
  .dash-hero .big-pct{
    font-family:'Bricolage Grotesque', sans-serif;
    font-weight:700;
    font-size: 44px;
    line-height:1;
    margin: 6px 0 4px;
  }
  .dash-hero .sub{ font-size: 12px; opacity:.85; }
  .dash-hero .bar{ background: rgba(255,251,242,0.25); margin-top:10px; }
  .dash-hero .bar > div{ background:#FFFBF2; }
  .dash-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
  .dash-mini{
    background: var(--card);
    border:1px solid var(--line);
    border-radius: 12px;
    padding: 12px;
  }
  .dash-mini .lbl{ font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.05em; font-family:'JetBrains Mono', monospace; }
  .dash-mini .val{ font-family:'Bricolage Grotesque', sans-serif; font-weight:700; font-size:22px; margin-top:2px; }
  .dash-mini .val small{ font-size:12px; color:var(--ink-soft); font-weight:400; }

  /* water counter */
  .water-row{ display:flex; align-items:center; gap:10px; margin: 4px 0 12px; }
  .water-cups{ display:flex; gap:5px; flex:1; flex-wrap:wrap; }
  .water-cup{
    width: 30px; height: 38px;
    border: 2px solid var(--line);
    border-radius: 4px 4px 8px 8px;
    background: transparent;
    cursor:pointer;
    position:relative;
    transition: all .15s ease;
  }
  .water-cup::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:0;
    height:0%;
    background: #5BA3D0;
    border-radius: 0 0 5px 5px;
    transition: height .25s ease;
  }
  .water-cup.filled::after{ height: 75%; }
  .water-cup.filled{ border-color:#5BA3D0; }
  .water-info{ font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--ink-soft); white-space:nowrap; }

  /* gratitude */
  .grat-list{ display:flex; flex-direction:column; gap:8px; margin-bottom: 12px; }
  .grat-item{
    display:flex; align-items:center; gap:8px;
  }
  .grat-item .num{
    flex:0 0 auto;
    width:22px; height:22px;
    border-radius:50%;
    background: var(--accent-soft);
    color: var(--accent);
    font-family:'JetBrains Mono', monospace;
    font-size:11px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
  }
  .grat-item input{
    flex:1;
    font-family:'Karla', sans-serif;
    font-size:14px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--input-bg);
    color: var(--ink);
  }
  .grat-item input:focus{ outline: 2px solid var(--accent); outline-offset:1px; }

  /* fade-in animation */
  .fade-in{ animation: fadeIn .28s ease; }
  @keyframes fadeIn{
    from{ opacity:0; transform: translateY(6px); }
    to{ opacity:1; transform: translateY(0); }
  }

  /* ============ TOAST ============ */
  #toastWrap{
    position: fixed;
    left: 50%;
    bottom: 18px;
    transform: translateX(-50%);
    z-index: 999;
    display:flex;
    flex-direction:column;
    gap:8px;
    pointer-events:none;
    width: max-content;
    max-width: 90vw;
  }
  .toast{
    background: var(--ink);
    color: var(--bg);
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight:600;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    animation: toastIn .25s ease, toastOut .25s ease 2.2s forwards;
    display:flex; align-items:center; gap:8px;
  }
  .toast.ok::before{ content:"✓"; color:#9BC97A; font-weight:700; }
  .toast.warn::before{ content:"!"; color:#E0A23C; font-weight:700; }
  @keyframes toastIn{ from{ opacity:0; transform: translateY(10px); } to{ opacity:1; transform: translateY(0); } }
  @keyframes toastOut{ to{ opacity:0; transform: translateY(10px); } }

  /* ============ MODAL ============ */
  .modal-overlay{
    position: fixed; inset:0;
    background: var(--overlay);
    display:flex; align-items:center; justify-content:center;
    z-index: 998;
    padding: 20px;
    animation: fadeIn .2s ease;
  }
  .modal{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px;
    width: 100%;
    max-width: 360px;
    max-height: calc(100vh - 40px);
    overflow-y: auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }
  .modal h3{
    font-family:'Bricolage Grotesque', sans-serif;
    font-size: 18px;
    margin: 0 0 12px;
    position: sticky;
    top: -20px;
    background: var(--card);
    padding: 20px 0 8px;
    margin: -20px -20px 12px;
    padding-left: 20px;
    padding-right: 20px;
    z-index: 1;
  }
  .modal-actions{
    position: sticky;
    bottom: -20px;
    background: var(--card);
    padding: 12px 0 4px;
    margin: 0 -20px -20px;
    padding-left: 20px;
    padding-right: 20px;
    display:flex;
    gap:8px;
    justify-content:flex-end;
    flex-wrap:wrap;
  }
  .modal label{
    display:block;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 4px;
    font-family:'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing:.05em;
  }
  .modal input[type=text]{
    width:100%;
    font-family:'Karla', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--input-bg);
    color: var(--ink);
    margin-bottom: 12px;
  }
  .modal input[type=text]:focus{ outline: 2px solid var(--accent); outline-offset:1px; }
  .modal .color-row{ display:flex; gap:8px; margin-bottom: 16px; flex-wrap:wrap; }
  .modal .color-swatch{
    width: 30px; height:30px; border-radius:50%;
    border: 2px solid transparent;
    cursor:pointer;
    transition: transform .15s ease;
  }
  .modal .color-swatch:hover{ transform: scale(1.1); }
  .modal .color-swatch.selected{ border-color: var(--ink); transform: scale(1.1); }
  .modal-actions{ display:flex; gap:8px; justify-content:flex-end; }

  /* tab close (custom) */
  .tab-close{
    margin-left: 4px;
    font-size: 14px;
    line-height: 1;
    opacity: .5;
    padding: 0 0 0 2px;
  }
  .tab-close:hover{ opacity: 1; color: #FFFBF2; }

  /* sticky footer mini-status */
  .mini-footer{
    position: fixed;
    left:0; right:0; bottom:0;
    background: var(--card);
    border-top: 1px solid var(--line);
    padding: 8px 16px;
    display:flex; align-items:center; justify-content:space-between;
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: .05em;
    z-index: 50;
    max-width: 480px;
    margin: 0 auto;
  }
  .mini-footer .right{ display:flex; gap:10px; align-items:center; }

  /* ============ NUTRIÇÃO: HIDRATAÇÃO CONFIGURÁVEL ============ */
  .water-display{
    display:flex;
    align-items:center;
    gap:14px;
    margin: 4px 0 10px;
  }
  .water-ring{
    flex:0 0 auto;
    width: 84px; height: 84px;
    position:relative;
    display:flex; align-items:center; justify-content:center;
  }
  .water-ring svg{ width:100%; height:100%; transform: rotate(-90deg); }
  .water-ring .ring-bg{ fill:none; stroke:var(--line); stroke-width:8; }
  .water-ring .ring-fg{ fill:none; stroke:#5BA3D0; stroke-width:8; stroke-linecap:round; transition: stroke-dashoffset .4s ease; }
  .water-ring .ring-center{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace;
  }
  .water-ring .ring-center b{ font-size:18px; line-height:1; }
  .water-ring .ring-center small{ font-size:9px; color:var(--ink-soft); margin-top:2px; }
  .water-info-block{ flex:1; min-width:0; }
  .water-info-block .need{ font-size:13px; line-height:1.3; }
  .water-info-block .need b{ font-family:'JetBrains Mono', monospace; color:var(--accent); }
  .water-info-block .ml{ font-size:11px; color:var(--ink-soft); margin-top:2px; font-family:'JetBrains Mono', monospace; }

<script>
/* ================== CONFIG ================== */
const SUPABASE_URL = "https://mvbpdfzaypnlctspwsiw.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12YnBkZnpheXBubGN0c3B3c2l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1ODUzNDYsImV4cCI6MjA5ODE2MTM0Nn0.STVSWY1w34z94SX6JkUD2kzNiXtbI8LHDBxnKvLmuco";

/* Built-in modules. Mental + Humor merged into "bemestar". */
const MODULES = {
  resumo:      { label: "Resumo",     kind: "dashboard",  accent: "#C1502E", builtin:true },
  manha:       { label: "Manhã",      kind: "checklist",  period:"day",  accent: "#C1502E", defaults: ["Tomei banho","Lavei o rosto","Escovei os dentes","Usei fio dental","Cortei/limpei as unhas","Passei desodorante","Pentes/arrumei o cabelo"] },

let MODULE_ORDER = ["resumo","manha","bemestar","organizacao","noturno","semanal","saida","tarefas","historico"];

/* mood options reused by bemestar + history */
const MOOD_OPTIONS = [
  {v:1, e:"😞", label:"Muito ruim"},

];

/* ================== STATE & STORAGE ================== */
let ONLINE = false;
let editMode = {};
let cache = loadCache();

function loadCache(){
  try{
    const c = JSON.parse(localStorage.getItem("ritual_cache")) || {};
    return {
      items: c.items || [],
      status: c.status || [],
      tasks: c.tasks || [],
      mood: c.mood || [],
      water: c.water || [],          // {day_key, count}
      gratitude: c.gratitude || [],  // {day_key, items:[3]}
      customModules: c.customModules || [],  // {key,label,accent}
      nutritionSettings: c.nutritionSettings || defaultNutritionSettings(),
      macrosLog: c.macrosLog || [],        // {day_key, carbs, protein, fat}
      pyramidLog: c.pyramidLog || [],      // {day_key, counts:{groupId:n}}
    };
  }catch(e){
    return {
      items:[], status:[], tasks:[], mood:[], water:[], gratitude:[],
      customModules:[], nutritionSettings: defaultNutritionSettings(), macrosLog:[], pyramidLog:[]
    };
  }
}
/* default nutrition settings — sensible defaults that the user can override */
function defaultNutritionSettings(){
  return {
    weight: 70,              // kg — used to auto-calc water need
    cupSizeMl: 250,          // ml per cup
    waterAutoCalc: true,     // if true, water goal = weight*35ml/cupSize
    waterGoalOverride: 8,    // used when waterAutoCalc is false (copos)
    macros: {
      carbs:   { goal: 250, unit: "g" },
      protein: { goal: 80,  unit: "g" },
      fat:     { goal: 60,  unit: "g" },
    },
    pyramidGroups: [
      { id:"g_acucar",  label:"Açúcares e gorduras", goal: 1, color:"#B5566B", icon:"🍭", note:"use com moderação" },
      { id:"g_protei",  label:"Carnes, ovos, leite",  goal: 3, color:"#C1502E", icon:"🥩" },
      { id:"g_frutas",  label:"Frutas",               goal: 3, color:"#D6A23C", icon:"🍎" },
      { id:"g_verdur",  label:"Verduras e legumes",   goal: 4, color:"#6B7A3A", icon:"🥬" },
      { id:"g_cereai",  label:"Cereais e grãos",      goal: 6, color:"#9C6B2E", icon:"🍞" },
    ],
  };
}
function saveCache(){ localStorage.setItem("ritual_cache", JSON.stringify(cache)); }

/* merge custom modules into MODULES + MODULE_ORDER on load */
function syncCustomModules(){
  cache.customModules.forEach(cm=>{
    if(!MODULES[cm.key]){
      MODULES[cm.key] = { label: cm.label, kind:"checklist", period:"day", accent: cm.accent, custom:true };
    }
  });
  // ensure order includes custom modules (after saida, before tarefas)
  const customs = cache.customModules.map(c=>c.key);
  MODULE_ORDER = ["resumo","manha","bemestar","organizacao","noturno","semanal","saida", ...customs, "tarefas","historico"];
}
/* push local custom modules to Supabase (upsert) so other devices see them */
async function syncCustomModulesFromCache(){
  if(!sb) return;
  try{
    for(const cm of cache.customModules){
      await sb.from("custom_modules").upsert(
        { key: cm.key, label: cm.label, accent: cm.accent },
        { onConflict: "key" }
      );
    }
  }catch(e){}
}

function todayKey(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function weekKey(){
  const d = new Date();
  const onejan = new Date(d.getFullYear(),0,1);
  const week = Math.ceil((((d - onejan) / 86400000) + onejan.getDay()+1) / 7);
  return d.getFullYear()+"-W"+String(week).padStart(2,"0");
}
function periodKeyFor(moduleKey){
  return MODULES[moduleKey].period === "week" ? weekKey() : todayKey();
}

/* ================== SUPABASE I/O (com fallback local) ================== */
async function fetchAll(){
  if(!sb){ setOnline(false); return; }
  try{
    const [items, status, tasks, mood, water, macros, pyramid, nutri, grat, customs] = await Promise.all([
      sb.from("checklist_items").select("*").order("position"),
      sb.from("checklist_status").select("*"),
      sb.from("tasks").select("*").order("position"),
      sb.from("mood_log").select("*"),
      sb.from("water_log").select("*"),
      sb.from("macros_log").select("*"),
      sb.from("pyramid_log").select("*"),
      sb.from("nutrition_settings").select("*").limit(1),
      sb.from("gratitude_log").select("*"),
      sb.from("custom_modules").select("*").order("created_at"),
    ]);
    if(items.error || status.error || tasks.error || mood.error) throw new Error("fetch error");
    // core data (required)
    cache.items = items.data;
    cache.status = status.data;
    cache.tasks = tasks.data;
    cache.mood = mood.data;
    // nutrition data (optional — if tables don't exist yet, silently keep local cache)
    if(!water.error && water.data)  cache.water = water.data.map(r=>({day_key:r.day_key, count:r.count}));
    if(!macros.error && macros.data) cache.macrosLog = macros.data.map(r=>({day_key:r.day_key, carbs:r.carbs||0, protein:r.protein||0, fat:r.fat||0}));
    if(!pyramid.error && pyramid.data) cache.pyramidLog = pyramid.data.map(r=>({day_key:r.day_key, counts:r.counts||{}}));
    if(!grat.error && grat.data) cache.gratitude = grat.data.map(r=>({day_key:r.day_key, items:r.items||["","",""]}));
    if(!customs.error && customs.data) cache.customModules = customs.data.map(r=>({key:r.key, label:r.label, accent:r.accent}));
    // nutrition settings — only overwrite if remote has real data (not empty {})
    if(!nutri.error && nutri.data && nutri.data.length>0){

async function seedDefaultsIfNeeded(){
  if(localStorage.getItem("ritual_seeded_v2")) return;
  let needsInsert = [];
  for(const key of Object.keys(MODULES)){
    const m = MODULES[key];
    if(m.kind !== "checklist") continue;
    if(m.custom) continue; // do not seed custom into supabase
    const existing = cache.items.filter(i=>i.module===key);
    if(existing.length === 0){
      m.defaults.forEach((label, idx)=>{
        needsInsert.push({ module:key, label, position: idx, active:true });
      });
    }
  }
  if(needsInsert.length){
    const { data, error } = await sb.from("checklist_items").insert(needsInsert).select();
    if(!error && data){
      cache.items = cache.items.concat(data);
      saveCache();
    }
  }
  localStorage.setItem("ritual_seeded_v2","1");
}

/* ===== date helpers (for tasks on other days) ===== */
function dateOffsetKey(baseKey, days){
  const [y,m,d] = baseKey.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate()+days);
  return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
}
function endOfWeekKey(baseKey){
  // week ends on Sunday
  const [y,m,d] = baseKey.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  const dow = dt.getDay(); // 0=Sun..6=Sat
  const daysToSunday = (7 - dow) % 7;
  dt.setDate(dt.getDate() + daysToSunday);
  return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
}
function formatTaskDateLabel(dayKey){
  const today = todayKey();
  if(dayKey === today) return "hoje";
  if(dayKey === dateOffsetKey(today, 1)) return "amanhã";
  if(dayKey === dateOffsetKey(today, -1)) return "ontem";
  const [y,m,d] = dayKey.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString('pt-BR', {weekday:'short', day:'2-digit', month:'2-digit'});
}

/* Water goal: auto from weight (35ml/kg) or manual override (in cups) */
function getWaterGoalCups(){
  const s = cache.nutritionSettings;
  if(s.waterAutoCalc){
    const ml = Math.max(800, s.weight * 35);  // floor 800ml safety
    return Math.max(1, Math.round(ml / s.cupSizeMl));
  }
  return Math.max(1, s.waterGoalOverride || 8);
}
function getWaterGoalMl(){
  return getWaterGoalCups() * cache.nutritionSettings.cupSizeMl;
}
function getWaterNeedMl(){
  // raw need based on weight (for display, before rounding to cups)
  return Math.max(800, Math.round(cache.nutritionSettings.weight * 35));
}

  if(!confirm("Excluir este módulo e todos os itens dele?")) return;
  cache.customModules = cache.customModules.filter(c=>c.key!==key);
  // collect item ids before removing them
  const itemIds = cache.items.filter(i=>i.module===key).map(i=>i.id);
  cache.items = cache.items.filter(i=>i.module!==key);
  cache.status = cache.status.filter(s=> !itemIds.includes(s.item_id));
  delete MODULES[key];
  MODULE_ORDER = MODULE_ORDER.filter(k=>k!==key);
  if(activeModule===key) activeModule = "resumo";
  saveCache();
  try{
    if(sb){
      sb.from("custom_modules").delete().eq("key", key);
      if(itemIds.length){
        sb.from("checklist_status").delete().in("item_id", itemIds);
        sb.from("checklist_items").delete().eq("module", key);
      }
    }
  }catch(e){}
  render();
  toast("Módulo excluído","warn");
}

function renderTasks(area){

  // group definitions — order matters (top to bottom)
  const groups = [
    { key:"atrasadas", label:"⏰ Atrasadas", cls:"overdue",
      filter: t => t.day_key < today && !t.done },
    { key:"hoje", label:"📍 Hoje", cls:"today",

    { key:"amanha", label:"➡ Amanhã", cls:"",

    { key:"semana", label:"🗓 Esta semana", cls:"",
      filter: t => t.day_key > tomorrow && t.day_key <= eow },
    { key:"proximas", label:"📅 Próximas", cls:"",

    { key:"concluidas", label:"✓ Concluídas (anteriores)", cls:"done-sec",
      filter: t => t.day_key < today && t.done },
  ];

    ...g,
    tasks: allTasks.filter(g.filter).sort((a,b)=>{
      if(a.day_key !== b.day_key) return a.day_key < b.day_key ? -1 : 1;
      return a.position - b.position;
    }),
  })).filter(g => g.tasks.length > 0);

  // today's progress (for the hero bar)
  const todayTasks = allTasks.filter(t => t.day_key === today);
  const todayDone = todayTasks.filter(t => t.done).length;
  const totalOpen = allTasks.filter(t => !t.done).length;

  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="module-head">
      <div><h2>Tarefas</h2><span class="period">${formatDateLabel()} · ${totalOpen} em aberto</span></div>
      <span class="frac">${todayDone}/${todayTasks.length}</span>
    </div>
    <div class="bar"><div style="width:${todayTasks.length?Math.round(todayDone/todayTasks.length*100):0}%"></div></div>
    <div id="taskGroups"></div>
    ${grouped.length===0 ? '<p class="empty">Nenhuma tarefa. Adicione abaixo. 🎯</p>' : ""}
    <div class="task-add-form">
      <input type="text" id="newTask" placeholder="Nova tarefa..." maxlength="120">
      <input type="date" id="newTaskDate" value="${today}">
      <select class="priority" id="taskPriority">
        <option value="baixa">baixa</option>
        <option value="media" selected>média</option>
        <option value="alta">alta</option>
      </select>
      <button class="btn primary" id="addTaskBtn">Add</button>
    </div>
    <div class="task-quick-dates" id="quickDates">
      <button data-d="today">hoje</button>
      <button data-d="tomorrow">amanhã</button>
      <button data-d="+3">em 3 dias</button>
      <button data-d="+7">próx. semana</button>
    </div>
  `;
  area.appendChild(card);

  // render groups
  const groupsEl = card.querySelector("#taskGroups");
  grouped.forEach(g => {
    const gDone = g.tasks.filter(t=>t.done).length;
    const gEl = document.createElement("div");
    gEl.className = "task-group";
    gEl.innerHTML = `<div class="task-group-head ${g.cls}"><span class="tg-label">${escapeHtml(g.label)}</span><span class="tg-count">${gDone}/${g.tasks.length}</span></div>`;
    const ul = document.createElement("ul");
    ul.className = "items";
    g.tasks.forEach(t => {
      const li = document.createElement("li");
      li.className = "task-row";
      const isOverdue = t.day_key < today && !t.done;
      const isToday = t.day_key === today;
      const dateCls = isOverdue ? "overdue" : (isToday ? "today" : "");
      li.innerHTML = `
        <button class="stamp ${t.done?'checked':''}" aria-label="marcar">${t.done?'OK':''}</button>
        <span class="item-label ${t.done?'done':''}">${escapeHtml(t.label)}</span>
        <label class="task-date-pill ${dateCls}" title="mudar data">
          ${escapeHtml(formatTaskDateLabel(t.day_key))}
          <input type="date" value="${t.day_key}" data-task="${t.id}">
        </label>
        <span class="pill" style="background:${prioColor[t.priority]||'#6B5D4D'}">${escapeHtml(t.priority)}</span>
        <div class="edit-controls">
          <button data-act="up" aria-label="subir">↑</button>
          <button data-act="down" aria-label="descer">↓</button>
          <button data-act="del" aria-label="excluir">✕</button>
        </div>
      `;
      li.querySelector(".stamp").onclick = (e)=>{
        toggleTask(t.id);
        e.currentTarget.classList.add("bump");
        setTimeout(()=>e.currentTarget.classList.remove("bump"),300);
      };
      li.querySelector('[data-act="up"]').onclick = ()=> moveTask(t.id, -1);
      li.querySelector('[data-act="down"]').onclick = ()=> moveTask(t.id, 1);
      li.querySelector('[data-act="del"]').onclick = ()=>{ if(confirm("Remover tarefa?")) deleteTask(t.id); };
      // date pill → open native date picker
      const dateInput = li.querySelector('input[type=date]');
      li.querySelector('.task-date-pill').onclick = (e)=>{
        if(e.target === dateInput) return; // let the input handle its own click
        e.preventDefault();
        if(dateInput.showPicker) dateInput.showPicker();
        else dateInput.click();
      };
      dateInput.onchange = ()=>{
        if(dateInput.value && dateInput.value !== t.day_key){
          moveTaskToDay(t.id, dateInput.value);
        }
      };
      ul.appendChild(li);
    });
    gEl.appendChild(ul);
    groupsEl.appendChild(gEl);
  });

  // add form
  const addBtn = card.querySelector("#addTaskBtn");
  const input = card.querySelector("#newTask");
  const dateInput = card.querySelector("#newTaskDate");
  const prio = card.querySelector("#taskPriority");
  const submit = ()=>{
    const v = input.value.trim();
    if(v){ addTask(v, prio.value, dateInput.value || today); input.value=""; }
  };
  addBtn.onclick = submit;
  input.onkeydown = (e)=>{ if(e.key==="Enter") submit(); };

  // quick date buttons
  const quickEl = card.querySelector("#quickDates");
  const setActive = (key) => {
    quickEl.querySelectorAll("button").forEach(b=>b.classList.toggle("active", b.dataset.d===key));
  };
  setActive("today");
  quickEl.querySelectorAll("button").forEach(b=>{
    b.onclick = ()=>{
      const d = b.dataset.d;
      let key;
      if(d==="today") key = today;
      else if(d==="tomorrow") key = tomorrow;
      else if(d.startsWith("+")) key = dateOffsetKey(today, parseInt(d.slice(1),10));
      if(key){ dateInput.value = key; setActive(d); }
    };
  });
  dateInput.onchange = ()=>{ setActive(null); };
}

/* ============ MERGED MENTAL + HUMOR VIEW ============ */
function renderMentalHumor(area){
  const moduleKey = "bemestar";
  const m = MODULES[moduleKey];
  const periodKey = periodKeyFor(moduleKey);
  const day = todayKey();
  const items = cache.items.filter(i=>i.module===moduleKey && i.active).sort((a,b)=>a.position-b.position);
  const checkedCount = items.filter(i=>{
    const st = cache.status.find(s=>s.item_id===i.id && s.period_key===periodKey);
    return st && st.checked;
  }).length;
  const pct = items.length ? Math.round(checkedCount/items.length*100) : 0;
  const current = cache.mood.find(x=>x.day_key===day);

  /* --- Card 1: Mental checklist --- */
  const c1 = document.createElement("div");
  c1.className = "card";
  c1.innerHTML = `
    <div class="module-head">
      <div><h2>Bem-estar mental</h2><span class="period">${formatDateLabel()}</span></div>
      <span class="frac">${checkedCount}/${items.length}</span>
    </div>
    <div class="bar"><div style="width:${pct}%"></div></div>
    <ul class="items" id="list-${moduleKey}"></ul>
    ${items.length===0 ? '<p class="empty">Nenhum item ainda.</p>' : ""}
    <div class="row-actions">
      <button class="btn" id="editBtn-${moduleKey}">${editMode[moduleKey] ? "Concluir edição" : "Editar itens"}</button>
    </div>
    ${editMode[moduleKey] ? `<div class="add-row"><input type="text" id="newItem-${moduleKey}" placeholder="Novo item..."><button class="btn primary" id="addBtn-${moduleKey}">Add</button></div>` : ""}
  `;
  area.appendChild(c1);

  const list = c1.querySelector(`#list-${moduleKey}`);
  items.forEach(it=>{
    const st = cache.status.find(s=>s.item_id===it.id && s.period_key===periodKey);
    const checked = st && st.checked;
    const li = document.createElement("li");
    li.innerHTML = `
      <button class="stamp ${checked?'checked':''}" aria-label="marcar">${checked?'OK':''}</button>
      <span class="item-label ${checked?'done':''}">${escapeHtml(it.label)}</span>
      ${editMode[moduleKey] ? `<div class="edit-controls">
        <button data-act="up">↑</button>
        <button data-act="down">↓</button>
        <button data-act="edit">✎</button>
        <button data-act="del">✕</button>
      </div>` : ""}
    `;
    li.querySelector(".stamp").onclick = (e)=> toggleCheck(it.id, periodKey, e.currentTarget);
    if(editMode[moduleKey]){
      li.querySelector('[data-act="up"]').onclick = ()=> moveItem(moduleKey, it.id, -1);
      li.querySelector('[data-act="down"]').onclick = ()=> moveItem(moduleKey, it.id, 1);
      li.querySelector('[data-act="edit"]').onclick = ()=>{
        const novo = prompt("Editar item:", it.label);
        if(novo && novo.trim()) editItemLabel(it.id, novo.trim());
      };
      li.querySelector('[data-act="del"]').onclick = ()=>{
        if(confirm("Remover este item?")) deleteItem(it.id);
      };
    }
    list.appendChild(li);
  });
  c1.querySelector(`#editBtn-${moduleKey}`).onclick = ()=>{ editMode[moduleKey] = !editMode[moduleKey]; render(); };
  const addBtn = c1.querySelector(`#addBtn-${moduleKey}`);
  if(addBtn){
    const input = c1.querySelector(`#newItem-${moduleKey}`);
    const submit = ()=>{ const v = input.value.trim(); if(v){ addItem(moduleKey, v); input.value=""; } };
    addBtn.onclick = submit;
    input.onkeydown = (e)=>{ if(e.key==="Enter") submit(); };
  }

  /* --- Card 2: Humor --- */
  const c2 = document.createElement("div");
  c2.className = "card";
  c2.innerHTML = `
    <div class="module-head"><div><h2>Humor do dia</h2><span class="period">${formatDateLabel()}</span></div></div>
    <div class="mood-grid" id="moodGrid"></div>
    <textarea class="note" id="moodNote" placeholder="Algo que queira anotar sobre hoje (opcional)">${current ? escapeHtml(current.note||"") : ""}</textarea>
    <div class="row-actions"><button class="btn primary" id="saveMood">Salvar humor</button></div>
  `;
  area.appendChild(c2);
  const grid = c2.querySelector("#moodGrid");
  let selected = current ? current.value : null;
  MOOD_OPTIONS.forEach(o=>{
    const b = document.createElement("button");
    b.textContent = o.e;
    b.title = o.label;
    if(selected===o.v) b.classList.add("selected");
    b.onclick = ()=>{
      selected=o.v;
      grid.querySelectorAll("button").forEach(x=>x.classList.remove("selected"));
      b.classList.add("selected");
    };
    grid.appendChild(b);
  });
  c2.querySelector("#saveMood").onclick = ()=>{
    if(!selected){ toast("Escolha um humor primeiro","warn"); return; }
    setMood(selected, c2.querySelector("#moodNote").value.trim());
    render();
  };

  /* --- Card 3: Hidratação configurável --- */
  const waterGoal = getWaterGoalCups();
  const water = getWater(day);
  const waterMl = water * cache.nutritionSettings.cupSizeMl;
  const waterNeedMl = getWaterNeedMl();
  const waterPct = waterGoal ? Math.min(100, Math.round(water/waterGoal*100)) : 0;
  const c3 = document.createElement("div");
  c3.className = "card";
  // ring SVG (circumference for r=36 → 2*PI*36 ≈ 226)
  const RING_C = 2 * Math.PI * 36;
  const ringOffset = RING_C * (1 - waterPct/100);
  c3.innerHTML = `
    <div class="module-head">
      <div><h2>Hidratação</h2><span class="period">${cache.nutritionSettings.waterAutoCalc ? "meta automática (peso)" : "meta manual"}</span></div>
      <button class="btn ghost" id="waterConfigBtn" style="padding:5px 10px;font-size:12px;">⚙ Configurar</button>
    </div>
    <div class="water-display">
      <div class="water-ring">
        <svg viewBox="0 0 84 84">
          <circle class="ring-bg" cx="42" cy="42" r="36"/>
          <circle class="ring-fg" cx="42" cy="42" r="36" stroke-dasharray="${RING_C}" stroke-dashoffset="${ringOffset}"/>
        </svg>
        <div class="ring-center"><b>${water}</b><small>/${waterGoal} copos</small></div>
      </div>
      <div class="water-info-block">
        <div class="need">Você precisa de <b>${waterGoal} copos</b> (${getWaterGoalMl()} ml) por dia.</div>
        <div class="ml">Tomou: ${water} copos · ${waterMl} ml de ${getWaterGoalMl()} ml</div>
        ${water >= waterGoal ? '<div class="ml" style="color:#5C7A3A;font-weight:700;">✓ Meta de hidratação atingida!</div>' : `<div class="ml">Faltam: ${waterGoal-water} copos (${(waterGoal-water)*cache.nutritionSettings.cupSizeMl} ml)</div>`}
        <div class="ml" style="margin-top:4px;opacity:.7;">base: ${cache.nutritionSettings.weight} kg × 35 ml = ${waterNeedMl} ml/dia</div>
      </div>
    </div>
    <div class="water-cups-wrap" id="waterCups"></div>
    <div class="water-quick">
      <button class="btn" data-w="+1">+1 copo</button>
      <button class="btn" data-w="-1">−1</button>
      <button class="btn ghost" data-w="0">Zerar</button>
    </div>
  `;
  area.appendChild(c3);
  const cupsWrap = c3.querySelector("#waterCups");
  // render dynamic number of cups based on goal (cap at 16 for layout sanity)
  const cupDisplay = Math.min(16, Math.max(waterGoal, water));
  for(let i=1;i<=cupDisplay;i++){
    const cup = document.createElement("button");
    cup.className = "water-cup" + (i<=water ? " filled" : "");
    cup.setAttribute("aria-label","copo "+i);
    if(i > waterGoal){
      cup.style.borderColor = "var(--line)";
      cup.style.opacity = "0.5";
      cup.title = "além da meta";
    }
    cup.onclick = ()=>{
      const cur = getWater(day);
      const next = (i<=cur) ? i-1 : i;
      setWater(next);
      render();
    };
    cupsWrap.appendChild(cup);
  }
  if(cupDisplay < water){
    const more = document.createElement("span");
    more.className = "small-note";
    more.style.alignSelf = "center";
    more.textContent = "+"+(water-cupDisplay)+" copos";
    cupsWrap.appendChild(more);
  }
  c3.querySelectorAll(".water-quick button").forEach(btn=>{
    btn.onclick = ()=>{
      const w = btn.dataset.w;
      const cur = getWater(day);
      if(w==="0") setWater(0);
      else setWater(Math.max(0, cur + parseInt(w,10)));
      render();
    };
  });
  c3.querySelector("#waterConfigBtn").onclick = openNutritionSettingsModal;

  /* --- Card 4: Macros (carboidratos + proteína + gordura) --- */
  const macros = getMacros(day);
  const macroCfg = cache.nutritionSettings.macros;
  const macroMeta = [
    { key:"carbs",   label:"Carboidratos", color:"#D6A23C" },
    { key:"protein", label:"Proteínas",    color:"#C1502E" },
    { key:"fat",     label:"Gorduras",     color:"#9C6B2E" },
  ];
  const c4 = document.createElement("div");
  c4.className = "card";
  c4.innerHTML = `
    <div class="module-head">
      <div><h2>Macros</h2><span class="period">meta vs consumido (g)</span></div>
      <button class="btn ghost" id="macroConfigBtn" style="padding:5px 10px;font-size:12px;">⚙</button>
    </div>
    <div id="macroRows"></div>
    <div class="macro-quick-btns" id="carbQuick"></div>
    <div class="macro-add-row">
      <select id="macroSelect">
        <option value="carbs">Carboidratos</option>
        <option value="protein">Proteínas</option>
        <option value="fat">Gorduras</option>
      </select>
      <input type="number" id="macroGrams" placeholder="g" min="0" step="1" value="15">
      <button class="btn primary" id="macroAdd" style="padding:7px 12px;font-size:12px;">+ Adicionar</button>
    </div>
  `;
  area.appendChild(c4);
  const macroRowsEl = c4.querySelector("#macroRows");
  macroMeta.forEach(mm=>{
    const goal = macroCfg[mm.key].goal;
    const cons = macros[mm.key] || 0;
    const pct = goal ? Math.min(100, Math.round(cons/goal*100)) : 0;
    const row = document.createElement("div");
    row.className = "macro-row";
    row.innerHTML = `
      <span class="macro-dot" style="background:${mm.color}"></span>
      <span class="macro-label">${escapeHtml(mm.label)}</span>
      <div class="macro-bar"><div style="width:${pct}%; background:${mm.color}"></div></div>
      <span class="macro-frac"><b>${cons}</b>/${goal}g</span>
      <div class="stepper">
        <button data-m="${mm.key}" data-d="-5" aria-label="menos 5">−</button>
        <button data-m="${mm.key}" data-d="5" aria-label="mais 5">+</button>
      </div>
    `;
    row.querySelectorAll(".stepper button").forEach(b=>{
      b.onclick = ()=>{ addMacro(b.dataset.m, parseInt(b.dataset.d,10)); render(); };
    });
    macroRowsEl.appendChild(row);
  });
  // quick-add buttons for carbs (most common)
  const carbQuick = c4.querySelector("#carbQuick");
  [5, 10, 15, 25, 40].forEach(g=>{
    const b = document.createElement("button");
    b.textContent = "+"+g+"g carb";
    b.onclick = ()=>{ addMacro("carbs", g); toast("+"+g+"g carboidratos","ok"); render(); };
    carbQuick.appendChild(b);
  });
  c4.querySelector("#macroAdd").onclick = ()=>{
    const sel = c4.querySelector("#macroSelect").value;
    const g = parseInt(c4.querySelector("#macroGrams").value, 10);
    if(!g || g<=0){ toast("Informe gramas válidas","warn"); return; }
    addMacro(sel, g);
    render();
  };
  c4.querySelector("#macroGrams").onkeydown = (e)=>{ if(e.key==="Enter") c4.querySelector("#macroAdd").click(); };
  c4.querySelector("#macroConfigBtn").onclick = openNutritionSettingsModal;

  /* --- Card 5: Pirâmide alimentar --- */
  const groups = cache.nutritionSettings.pyramidGroups;
  const pyCounts = getPyramidCounts(day);
  // total portions goal + consumed
  const totalGoal = groups.reduce((s,g)=>s+g.goal,0);
  const totalCons = groups.reduce((s,g)=>s+(pyCounts[g.id]||0),0);
  const c5 = document.createElement("div");
  c5.className = "card";
  c5.innerHTML = `
    <div class="module-head">
      <div><h2>Pirâmide alimentar</h2><span class="period">${totalCons}/${totalGoal} porções hoje</span></div>
      <button class="btn ghost" id="pyramidConfigBtn" style="padding:5px 10px;font-size:12px;">⚙</button>
    </div>
    <div class="pyramid" id="pyramid"></div>
    <p class="pyramid-legend">Toque em um grupo para registrar uma porção consumida</p>
    <div class="pyramid-actions">
      <button class="btn ghost" id="pyramidReset">Zerar dia</button>
      <button class="btn" id="pyramidUndo">− última porção</button>
    </div>
  `;
  area.appendChild(c5);
  const pyEl = c5.querySelector("#pyramid");
  // layers from top (smallest, index 0) to bottom (largest, last)
  // width scales from 40% (top) to 100% (bottom)
  const nGroups = groups.length;
  groups.forEach((g, idx)=>{
    const cons = pyCounts[g.id] || 0;
    const pct = g.goal ? Math.min(100, Math.round(cons/g.goal*100)) : 0;
    const widthPct = 40 + (idx/(Math.max(1,nGroups-1))) * 60;  // 40% → 100%
    const layer = document.createElement("div");
    layer.className = "pyramid-layer";
    layer.setAttribute("role", "button");
    layer.setAttribute("tabindex", "0");
    layer.setAttribute("aria-label", g.label + ": " + cons + " de " + g.goal + " porções. Toque para adicionar.");
    layer.style.width = widthPct + "%";
    layer.style.background = g.color;
    layer.title = (g.note ? g.note+" · " : "") + "meta: "+g.goal+" porções";
    layer.innerHTML = `
      <div class="pl-left">
        <span class="pl-icon">${g.icon||"•"}</span>
        <span class="pl-name">${escapeHtml(g.label)}</span>
      </div>
      <span class="pl-frac">${cons}/${g.goal}</span>
      <span class="pl-edit">✎</span>
    `;
    layer.onclick = (e)=>{
      if(e.target.classList.contains("pl-edit")){
        e.stopPropagation();
        const novo = prompt("Meta de porções para \""+g.label+"\":", g.goal);
        if(novo !== null){
          const n = parseInt(novo,10);
          if(!isNaN(n) && n>=0){ g.goal = n; saveCache(); render(); }
        }
        return;
      }
      addPyramidCount(g.id, +1);
      render();
    };
    layer.oncontextmenu = (e)=>{
      e.preventDefault();
      addPyramidCount(g.id, -1);
      render();
    };
    layer.onkeydown = (e)=>{
      if(e.key==="Enter" || e.key===" "){
        e.preventDefault();
        addPyramidCount(g.id, +1);
        render();
      }
    };
    pyEl.appendChild(layer);
  });
  c5.querySelector("#pyramidReset").onclick = ()=>{
    if(!confirm("Zerar todas as porções de hoje?")) return;
    groups.forEach(g=> setPyramidCount(g.id, 0));
    render();
  };
  c5.querySelector("#pyramidUndo").onclick = ()=>{
    // remove 1 from the group with highest count
    let best=null, bestN=0;
    groups.forEach(g=>{
      const n = pyCounts[g.id]||0;
      if(n>bestN){ bestN=n; best=g; }
    });
    if(best){ addPyramidCount(best.id, -1); render(); }
  };
  c5.querySelector("#pyramidConfigBtn").onclick = openNutritionSettingsModal;

  /* --- Card 6: Gratidão --- */
  const grat = getGratitude(day);
  const c6 = document.createElement("div");
  c6.className = "card";
  c6.innerHTML = `
    <div class="module-head"><div><h2>Gratidão</h2><span class="period">3 coisas boas de hoje</span></div></div>
    <div class="grat-list">
      ${[0,1,2].map(i=>`<div class="grat-item"><span class="num">${i+1}</span><input type="text" id="grat-${i}" placeholder="Sou grato por..." value="${escapeHtml(grat[i]||"")}"></div>`).join("")}
    </div>
    <div class="row-actions"><button class="btn primary" id="saveGrat">Salvar gratidão</button></div>
  `;
  area.appendChild(c6);
  c6.querySelector("#saveGrat").onclick = ()=>{
    const items = [0,1,2].map(i=>c6.querySelector(`#grat-${i}`).value.trim());
    setGratitude(items);
    toast("Gratidão salva","ok");
    render();
  };
}

/* ============ DASHBOARD / RESUMO ============ */
function renderDashboard(area){
  const day = todayKey();
  // overall today completion across all day-checklists
  const dayModules = MODULE_ORDER.filter(k=>MODULES[k] && MODULES[k].kind==="checklist" && MODULES[k].period==="day");
  let totalItems=0, totalChecked=0;
  dayModules.forEach(key=>{
    const items = cache.items.filter(i=>i.module===key && i.active);
    totalItems += items.length;
    items.forEach(it=>{
      const st = cache.status.find(s=>s.item_id===it.id && s.period_key===day);
      if(st && st.checked) totalChecked++;
    });
  });
  const overall = totalItems ? Math.round(totalChecked/totalItems*100) : 0;

  const hero = document.createElement("div");
  hero.className = "card dash-hero";
  hero.innerHTML = `
    <div class="module-head">
      <div><h2>Seu dia</h2><span class="period">${formatDateLabel()}</span></div>
    </div>
    <div class="big-pct">${overall}%</div>
    <div class="sub">${totalChecked} de ${totalItems} hábitos concluídos</div>
    <div class="bar"><div style="width:${overall}%"></div></div>
  `;
  area.appendChild(hero);

  const grid = document.createElement("div");
  grid.className = "dash-grid";
  // mood
  const mood = cache.mood.find(m=>m.day_key===day);
  const moodOpt = mood ? MOOD_OPTIONS.find(o=>o.v===mood.value) : null;
  grid.appendChild(miniCard("Humor", moodOpt ? moodOpt.e : "—", moodOpt ? moodOpt.label : "sem registro"));
  // water (dynamic goal)
  const water = getWater(day);
  const wGoal = getWaterGoalCups();
  const wPct = wGoal ? Math.round(water/wGoal*100) : 0;
  grid.appendChild(miniCard("Água", water+"<small>/"+wGoal+"</small>", wPct+"% · "+(water*cache.nutritionSettings.cupSizeMl)+"ml"));
  // carbs (macros)
  const macros = getMacros(day);
  const carbsGoal = cache.nutritionSettings.macros.carbs.goal;
  const carbsPct = carbsGoal ? Math.round(macros.carbs/carbsGoal*100) : 0;
  grid.appendChild(miniCard("Carboidratos", macros.carbs+"<small>g</small>", carbsPct+"% de "+carbsGoal+"g"));

  groups.forEach(g=>{

  const weekDone = weekTasks.filter(t=>t.done).length;
  tCard.innerHTML = `<h3>Tarefas — últimos 7 dias</h3><p class="small-note">${weekDone} de ${weekTasks.length} tarefas concluídas.</p>`;
  area.appendChild(tCard);
}

function lastNDays(n){
  const arr = [];
  for(let i=n-1; i>=0; i--){
    const d = new Date();
    d.setDate(d.getDate()-i);
    arr.push(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"));
  }
  return arr;
}
function computeCompletionPct(moduleKey, n){
  const items = cache.items.filter(i=>i.module===moduleKey && i.active);
  if(items.length===0) return 0;
  const days = lastNDays(n);
  let totalPossible=0, totalDone=0;
  days.forEach(day=>{
    items.forEach(it=>{
      const st = cache.status.find(s=>s.item_id===it.id && s.period_key===day);
      if(st){ totalPossible++; if(st.checked) totalDone++; }
    });
  });
  if(totalPossible===0) return 0;
  return Math.round(totalDone/totalPossible*100);
}
function computeStreak(moduleKey){
  const items = cache.items.filter(i=>i.module===moduleKey && i.active);
  if(items.length===0) return 0;
  let streak = 0;
  for(let i=0;i<365;i++){
    const d = new Date();
    d.setDate(d.getDate()-i);
    const key = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    const allChecked = items.every(it=>{
      const st = cache.status.find(s=>s.item_id===it.id && s.period_key===key);
      return st && st.checked;
    });
    if(allChecked) streak++;
    else break;
  }
  return streak;
}

function escapeHtml(s){
  if(s===undefined||s===null) return "";
  const div = document.createElement("div");
  div.textContent = String(s);
  return div.innerHTML;
}
function formatDateLabel(){
  return new Date().toLocaleDateString('pt-BR',{weekday:'long', day:'2-digit', month:'short'});
}

function toast(msg, kind){
  kind = kind || "ok";
  const wrap = document.getElementById("toastWrap");
  const t = document.createElement("div");
  t.className = "toast "+kind;
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(()=>{ t.remove(); }, 2600);
}

    root.querySelector("#nutProteinGoal").value = s.macros.protein.goal;

  root.querySelectorAll(".color-swatch").forEach(sw=>{
    sw.onclick = ()=>{
      root.querySelectorAll(".color-swatch").forEach(x=>x.classList.remove("selected"));
      sw.classList.add("selected");
      chosen = sw.dataset.color;
    };
  });
  const nameInput = root.querySelector("#newModName");
  nameInput.focus();
  const close = ()=>{ root.innerHTML = ""; };
  root.querySelector("#cancelMod").onclick = close;
  const submit = ()=>{
    const v = nameInput.value.trim();
    if(!v){ toast("Dê um nome ao módulo","warn"); return; }
    createCustomModule(v, chosen);
    close();
  };
  root.querySelector("#createMod").onclick = submit;
  nameInput.onkeydown = (e)=>{ if(e.key==="Enter") submit(); if(e.key==="Escape") close(); };
  root.querySelector(".modal-overlay").onclick = (e)=>{ if(e.target.classList.contains("modal-overlay")) close(); };
}

/* ================== FOOTER ================== */
function updateFooter(){
  const day = todayKey();
  const dayModules = MODULE_ORDER.filter(k=>MODULES[k] && MODULES[k].kind==="checklist" && MODULES[k].period==="day");
  let total=0, done=0;
  dayModules.forEach(key=>{
    const items = cache.items.filter(i=>i.module===key && i.active);
    total += items.length;
    items.forEach(it=>{
      const st = cache.status.find(s=>s.item_id===it.id && s.period_key===day);
      if(st && st.checked) done++;
    });
  });
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById("footerDate").textContent = new Date().toLocaleDateString('pt-BR',{weekday:'short', day:'2-digit', month:'2-digit'});
  document.getElementById("footerProgress").textContent = pct+"% hoje";
  // best streak across daily modules
  let best = 0;
  dayModules.forEach(k=>{ const s = computeStreak(k); if(s>best) best = s; });
  document.getElementById("footerStreak").textContent = "🔥 "+best;
}

/* ================== THEME ================== */
function applyTheme(theme){
  document.documentElement.setAttribute("data-theme", theme);
  document.getElementById("iconSun").style.display = theme==="dark" ? "none" : "block";
  document.getElementById("iconMoon").style.display = theme==="dark" ? "block" : "none";
  localStorage.setItem("ritual_theme", theme);
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute("data-theme") || "light";
  applyTheme(cur==="dark" ? "light" : "dark");
}

/* ================== PWA: SERVICE WORKER + INSTALL PROMPT ================== */
// Registra o service worker para funcionar offline no celular
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("/sw.js").catch(()=>{ /* falha silenciosa — app continua funcionando online */ });
  });
}

// Detecta se o app está instalado (rodando como standalone)
const IS_INSTALLED = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;

// Botão "Instalar app" (beforeinstallprompt) — só aparece em Android/Chrome quando instalável
let deferredPrompt = null;
window.addEventListener("beforeinstallprompt", (e)=>{
  e.preventDefault();
  deferredPrompt = e;
  showInstallButton();
});
window.addEventListener("appinstalled", ()=>{
  hideInstallButton();
  toast("App instalado! 🎉","ok");
});

function showInstallButton(){
  const wrap = document.querySelector(".wrap");
  if(!wrap || document.getElementById("installBanner")) return;
  const banner = document.createElement("div");
  banner.id = "installBanner";
  banner.style.cssText = "background:var(--accent);color:#FFFBF2;border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:13px;";
  banner.innerHTML = `
    <span style="font-size:22px;">📲</span>
    <div style="flex:1;min-width:0;">
      <b style="display:block;font-size:13px;">Instalar app</b>
      <span style="opacity:.85;font-size:11px;">use offline no celular, como app nativo</span>
    </div>
    <button id="installYes" style="background:#FFFBF2;color:var(--accent);border:none;border-radius:8px;padding:8px 12px;font-weight:700;font-size:12px;cursor:pointer;">Instalar</button>
    <button id="installNo" style="background:transparent;color:#FFFBF2;border:1px solid rgba(255,251,242,0.4);border-radius:8px;padding:8px 10px;font-size:12px;cursor:pointer;">×</button>
  `;
  wrap.insertBefore(banner, wrap.firstChild.nextSibling); // depois do header
  banner.querySelector("#installYes").onclick = async ()=>{
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    hideInstallButton();
  };
  banner.querySelector("#installNo").onclick = ()=>{
    hideInstallButton();
    localStorage.setItem("ritual_install_dismissed", "1");
  };
}
function hideInstallButton(){
  const b = document.getElementById("installBanner");
  if(b) b.remove();
}

/* ================== INIT ================== */
(async function init(){
  // theme
  const savedTheme = localStorage.getItem("ritual_theme") || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? "dark" : "light");
  applyTheme(savedTheme);
  document.getElementById("themeToggle").onclick = toggleTheme;

  // custom modules
  syncCustomModules();

  // deep link
  const params = new URLSearchParams(window.location.search);
  const mod = params.get("modulo");
  if(mod && MODULES[mod]) activeModule = mod;

  render(); // render imediato com cache local
  await fetchAll();
  render(); // re-render com dados do Supabase (se disponíveis)
  updateFooter();

  // mostra dica de instalação uma vez (se não foi dispensada e não está instalado)
  if(!IS_INSTALLED && !localStorage.getItem("ritual_install_dismissed") && deferredPrompt){
    showInstallButton();
  }
})();
</script>
